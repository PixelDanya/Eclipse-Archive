services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eclipse_archive_app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/.env
    environment:
      - APP_ENV=production
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: eclipse_archive_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: eclipse_archive_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-eclipse_archive}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - app_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: eclipse_archive_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-laravel}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - app_network
    depends_on:
      - db

volumes:
  db_data:
  

networks:
  app_network:
    driver: bridge
