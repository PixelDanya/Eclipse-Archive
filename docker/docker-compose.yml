version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eclipsearchive_app
    working_dir: /var/www
    volumes:
      - env_data:/var/www/.env
      - ../:/var/www
    ports:
      - "8000:80"
    depends_on:
      - db
    entrypoint: ["/var/www/docker/entrypoint.sh"]

  db:
    image: mysql:8.0
    container_name: eclipsearchive_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: eclipse_archive
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data: